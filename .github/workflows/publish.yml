name: Publish docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Quality gate
        run: npm run check
      - name: Build artifacts (dry run)
        run: DRY_RUN=1 node scripts/publish.mjs
      - name: Publish to hosted.devdocs.ai
        if: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN != '' }}
        env:
          PUSH_TOKEN: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN }}
          VERSION: ${{ github.sha }}
        run: node scripts/publish.mjs
