name: Publish docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Quality gate
        run: npm run check
      - name: Build artifacts (dry run)
        run: DRY_RUN=1 node scripts/publish.mjs
      - name: Publish to hosted.devdocs.ai
        if: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN != '' }}
        env:
          PUSH_TOKEN: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN }}
          VERSION: ${{ github.sha }}
        run: node scripts/publish.mjs
