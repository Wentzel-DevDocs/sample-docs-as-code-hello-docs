name: Publish docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Quality gate
        run: npm run check
      - name: Build artifacts (dry run)
        run: DRY_RUN=1 node scripts/publish.mjs
      - name: Publish to hosted.devdocs.ai
        if: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN != '' }}
        env:
          PUSH_TOKEN: ${{ secrets.HOSTED_DOCS_PUSH_TOKEN }}
          VERSION: ${{ github.sha }}
        run: node scripts/publish.mjs
